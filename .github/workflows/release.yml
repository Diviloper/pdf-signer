name: Build and release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Generate app icon
        run: uv run python scripts/build_icon.py

      - name: Build executable
        run: uv run pyinstaller pdf_signer.spec --noconfirm

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: PDF Signer build ${{ github.run_number }}
          files: dist/Diviloper-PDF-Signer.exe
          generate_release_notes: true
